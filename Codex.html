<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Codex</title>
    <link rel="stylesheet" href="Styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#58a6ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="Shared.js" defer></script>
    <script src="Settings.js" defer></script>
    <script src="marked.min.js" defer></script>
    <script src="CodexStorage.js" defer></script>
    <script src="CodexUI.js" defer></script>
</head>
<body>
    <header>
        <h1>Codex</h1>
        <nav id="global-nav"></nav>
        <button id="settings-button" aria-label="Open settings">⚙️</button>
        <div id="global-settings" tabindex="-1">
<div id="settings-overlay" class="settings-overlay"></div>

<div id="settings-panel" class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="settings-header">
        <h2 id="settings-title">Settings</h2>
        <button id="settings-close" aria-label="Close settings" class="close-btn">✕</button>
    </div>

    <div class="settings-search">
        <input type="text" id="settings-search-input" placeholder="Search settings..." aria-label="Search settings">
    </div>

    <div class="settings-content">
        <div class="settings-section" data-section="theme">
            <div class="section-header" tabindex="0">
                <span>Theme</span>
                <span class="arrow">▼</span>
            </div>
            <div class="section-body hidden">
                <label><input type="radio" name="theme" value="auto" checked> Auto (Match System)</label>
                <label><input type="radio" name="theme" value="light"> Light</label>
                <label><input type="radio" name="theme" value="dark"> Dark</label>
                <label><input type="radio" name="theme" value="blue"> Slate Blue</label>
                <label><input type="radio" name="theme" value="solarized"> Solarized</label>
                <label><input type="radio" name="theme" value="pastel"> Pastel</label>
                <button class="section-reset" id="reset-theme">Reset Theme</button>
            </div>
        </div>

        <div class="settings-section" data-section="font">
            <div class="section-header" tabindex="0">
                <span>Font Size</span>
                <span class="arrow">▼</span>
            </div>
            <div class="section-body hidden">
                <label><input type="radio" name="font-size" value="small"> Small</label>
                <label><input type="radio" name="font-size" value="medium" checked> Medium</label>
                <label><input type="radio" name="font-size" value="large"> Large</label>
                <button class="section-reset" id="reset-font">Reset Font Size</button>
            </div>
        </div>

        <div class="settings-section" data-section="accessibility">
            <div class="section-header" tabindex="0">
                <span>Accessibility</span>
                <span class="arrow">▼</span>
            </div>
            <div class="section-body hidden">
                <label><input type="checkbox" id="high-contrast-toggle"> High Contrast</label>
                <label><input type="checkbox" id="compact-mode-toggle"> Compact Mode</label>
                <button class="section-reset" id="reset-accessibility">Reset Accessibility</button>
            </div>
        </div>

        <div class="settings-section" data-section="advanced">
            <div class="section-header" tabindex="0">
                <span>Advanced</span>
                <span class="arrow">▼</span>
            </div>
            <div class="section-body hidden">
                <button id="export-settings" class="advanced-button">Export Settings</button>
                <button id="import-settings" class="advanced-button">Import Settings</button>
                <input type="file" id="import-file-input" accept=".json" hidden>
            </div>
        </div>

        <div class="settings-section" data-section="storage">
            <div class="section-header" tabindex="0">
                <span>Storage</span>
                <span class="arrow">▼</span>
            </div>
            <div class="section-body hidden">
                <div id="storage-info-container">
                    <p><strong>LocalStorage Usage</strong></p>
                    <div class="progress-container">
                        <div id="storage-progress-bar" class="progress-bar"></div>
                    </div>
                    <p id="storage-details" class="storage-details">Calculating...</p>
                </div>
                <button id="clear-storage-btn" class="advanced-button danger">Clear All LocalStorage Data</button>
                <p class="storage-warning">⚠️ This will delete ALL Codex data, drafts, and settings permanently. The page will reload after clearing.</p>
            </div>
        </div>
    </div>

    <button id="reset-settings" class="reset-button">Reset All</button>
</div>
        </div>
    </header>

    <main id="codex-app">
        <section id="codex-filters" aria-label="Codex filters"></section>
        <section id="codex-tools" aria-label="Codex tools"></section>
        <section id="codex-new" aria-label="Create new entry"></section>
        <section id="codex-list" aria-label="Codex entries"></section>
    </main>
</body>
</html>
