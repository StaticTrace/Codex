<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Codex</title>
    <link rel="stylesheet" href="Styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#58a6ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <!-- GitHub Pages performance: preload critical resources -->
    <link rel="preload" as="style" href="Styles.css">
    <link rel="preload" as="script" href="Shared.js">
    <link rel="preload" as="script" href="Settings.js">
    <link rel="preload" as="script" href="marked.min.js">
    <link rel="preload" as="script" href="CodexStorage.js">
    <link rel="preload" as="script" href="CodexUI.js">

    <script src="Shared.js" defer></script>
    <script src="Settings.js" defer></script>
    <script src="marked.min.js" defer></script>
    <script src="CodexStorage.js" defer></script>
    <script src="CodexUI.js" defer></script>
</head>
<body>
    <header>
        <h1>Codex</h1>
        <nav id="global-nav"></nav>
        <button id="settings-button" aria-label="Open settings">⚙️</button>
        <div id="global-settings" tabindex="-1">
        </div>
    </header>

    <main id="codex-app">
        <section id="codex-filters" aria-label="Codex filters"></section>
        <section id="codex-tools" aria-label="Codex tools"></section>
        <section id="codex-new" aria-label="Create new entry"></section>
        <section id="codex-list" aria-label="Codex entries"></section>
    </main>
</body>
</html>
