<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Codex</title>
    <link rel="stylesheet" href="Styles.css">
    <script src="Shared.js" defer></script>
    <script src="Settings.js" defer></script>
    <script src="CodexStorage.js" defer></script>
    <script src="CodexFilters.js" defer></script>
    <script src="CodexUI.js" defer></script>
</head>
<body>
    <header>
        <h1>Codex</h1>
        <nav id="global-nav" aria-label="Global navigation"></nav>
        <button id="settings-button" type="button" aria-label="Open settings">⚙️</button>
        <div id="global-settings"></div>
    </header>

    <main>
        <section id="codex-app" aria-label="Codex entries">
            <div id="codex-filters" class="codex-filters"></div>

            <div id="codex-tools" class="codex-tools"></div>

            <section class="codex-new-container" aria-label="New entry">
                <div id="codex-new"></div>
            </section>

            <section aria-label="Entries list">
                <div id="codex-list" class="codex-list"></div>
            </section>
        </section>
    </main>
</body>
</html>
