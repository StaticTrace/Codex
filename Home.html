<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Codex • Dashboard</title>
    <link rel="stylesheet" href="Styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#58a6ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <!-- GitHub Pages performance: preload critical resources -->
    <link rel="preload" as="style" href="Styles.css">
    <link rel="preload" as="script" href="Shared.js">
    <link rel="preload" as="script" href="Settings.js">
    <link rel="preload" as="script" href="CodexStorage.js">
    <!-- Preload SettingsPanel.html so the dynamic settings panel loads instantly -->
    <link rel="preload" as="fetch" href="SettingsPanel.html">

    <script src="Shared.js" defer></script>
    <script src="Settings.js" defer></script>
    <script src="CodexStorage.js" defer></script>
</head>
<body>
    <header>
        <h1>📊 Dashboard</h1>
        <nav id="global-nav"></nav>
        <button id="settings-button" aria-label="Open settings">⚙️</button>
        <div id="global-settings" tabindex="-1">
        </div>
    </header>

    <main>
        <p style="margin-bottom: 2rem; font-size: 1.1rem; opacity: 0.85;">Your fully offline knowledge base. Everything stays local and instantly available.</p>

        <!-- Quick Actions -->
        <div id="quick-actions" class="codex-tools" style="margin-bottom: 40px; justify-content: flex-start; flex-wrap: wrap;">
            <!-- Populated by JS for dynamic buttons -->
        </div>

        <!-- Refined Dashboard Widgets Layout -->
        <div class="dashboard-grid">
            <!-- Enhanced Analytics Dashboard -->
            <section id="analytics-dashboard" class="dashboard-widget">
                <h3>Knowledge Base Stats</h3>
                <div id="stats-content" class="home-stats-grid"></div>
            </section>

            <!-- Popular Tags Widget -->
            <section class="dashboard-widget">
                <h3>Popular Tags</h3>
                <div id="popular-tags" class="widget-tags"></div>
            </section>

            <!-- Category Breakdown Widget -->
            <section class="dashboard-widget">
                <h3>Category Breakdown</h3>
                <div id="category-breakdown" class="widget-categories"></div>
            </section>
        </div>

        <!-- Recent Entries -->
        <section class="recent-section">
            <h3>Recent Entries <span style="font-size:0.85rem; font-weight:400; opacity:0.7;">(tap to open &amp; edit instantly)</span></h3>
            <div id="recent-entries" class="recent-list"></div>
        </section>

        <!-- Tip / Next Steps -->
        <div style="margin-top:48px; padding:20px; background:var(--card-bg); border-radius:var(--border-radius); box-shadow:var(--card-shadow); font-size:0.95rem; display:flex; align-items:center; gap:12px;">
            <span style="font-size:1.8rem;">💡</span>
            <div>
                <strong>Pro tip:</strong> Press <kbd style="background:#f0f0f0;padding:2px 6px;border-radius:4px;font-family:monospace;">Ctrl</kbd> + <kbd style="background:#f0f0f0;padding:2px 6px;border-radius:4px;font-family:monospace;">K</kbd> anywhere in the app to open the Command Palette.
                <a href="Codex.html" style="margin-left:12px; color:var(--accent-color); text-decoration:underline;">Open full Codex →</a>
            </div>
        </div>
    </main>

    <script>
        // Improved Home Dashboard loader with stats, recent entries, quick actions, and deep-link support
        async function loadHomeDashboard() {
            if (!window.CodexStorage) {
                console.warn("[Home] CodexStorage not ready yet");
                return;
            }
            try {
                const entries = await window.CodexStorage.loadEntries();

                const total = entries.length;
                const pinned = entries.filter(e => e.pinned).length;
                const archived = entries.filter(e => e.archived).length;
                const favorites = entries.filter(e => e.favorite).length;
                const uniqueTags = new Set(entries.flatMap(e => e.tags || [])).size;

                const weekAgo = new Date();
                weekAgo.setDate(weekAgo.getDate() - 7);
                const thisWeek = entries.filter(e => new Date(e.updatedAt) > weekAgo).length;

                // Render beautiful stats grid
                const statsContainer = document.getElementById("stats-content");
                statsContainer.innerHTML = `
                    <div class="home-stat-card">
                        <strong>Total Entries</strong>
                        <div class="home-stat-value">${total}</div>
                        <span style="font-size:2rem;">📚</span>
                    </div>
                    <div class="home-stat-card">
                        <strong>Pinned</strong>
                        <div class="home-stat-value">${pinned}</div>
                        <span style="font-size:2rem;">📌</span>
                    </div>
                    <div class="home-stat-card">
                        <strong>Archived</strong>
                        <div class="home-stat-value">${archived}</div>
                        <span style="font-size:2rem;">📦</span>
                    </div>
                    <div class="home-stat-card">
                        <strong>Favorites</strong>
                        <div class="home-stat-value">${favorites}</div>
                        <span style="font-size:2rem;">⭐</span>
                    </div>
                    <div class="home-stat-card">
                        <strong>Unique Tags</strong>
                        <div class="home-stat-value">${uniqueTags}</div>
                        <span style="font-size:2rem;">🏷️</span>
                    </div>
                    <div class="home-stat-card">
                        <strong>Updated this week</strong>
                        <div class="home-stat-value">${thisWeek}</div>
                        <span style="font-size:2rem;">📅</span>
                    </div>
                `;

                // === NEW: Dashboard Widgets (Popular Tags + Category Breakdown) ===
                // Popular Tags
                const tagCounts = {};
                entries.forEach(entry => {
                    (entry.tags || []).forEach(tag => {
                        tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                    });
                });
                const topTags = Object.entries(tagCounts)
                    .sort(([,a], [,b]) => b - a)
                    .slice(0, 6);
                const tagsEl = document.getElementById("popular-tags");
                if (tagsEl) {
                    tagsEl.innerHTML = topTags.length 
                        ? topTags.map(([tag, count]) => `
                            <span class="tag-pill">${tag}<span class="tag-count">${count}</span></span>
                        `).join('') 
                        : `<p style="color:#888;font-style:italic;">No tags yet. Add some in Codex!</p>`;
                }

                // Category Breakdown
                const catCounts = {};
                entries.forEach(entry => {
                    const cat = entry.category;
                    if (cat) {
                        catCounts[cat] = (catCounts[cat] || 0) + 1;
                    }
                });
                const topCats = Object.entries(catCounts)
                    .sort(([,a], [,b]) => b - a)
                    .slice(0, 5);
                const catsEl = document.getElementById("category-breakdown");
                if (catsEl) {
                    catsEl.innerHTML = topCats.length 
                        ? topCats.map(([cat, count]) => `
                            <div class="category-item"><span>${cat}</span><span class="category-count">${count}</span></div>
                        `).join('') 
                        : `<p style="color:#888;font-style:italic;">No categories yet.</p>`;
                }

                // Render Recent Entries (clickable deep links)
                const recentContainer = document.getElementById("recent-entries");
                const sortedRecent = [...entries]
                    .filter(e => !e.archived)
                    .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt))
                    .slice(0, 6);

                if (sortedRecent.length === 0) {
                    recentContainer.innerHTML = `
                        <div class="codex-empty" style="text-align:left;padding:40px 20px;">
                            <p>No entries yet.</p>
                            <a href="Codex.html" class="codex-tool-button" style="display:inline-block;margin-top:12px;">Create your first entry →</a>
                        </div>
                    `;
                } else {
                    recentContainer.innerHTML = sortedRecent.map(entry => `
                        <a href="Codex.html?edit=${encodeURIComponent(entry.id)}" class="recent-item">
                            <div style="width:48px;height:48px;background:rgba(88,166,255,0.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;">📝</div>
                            <div style="flex:1;min-width:0;">
                                <div style="font-weight:600;line-height:1.3;">${entry.title}</div>
                                ${entry.category ? `<div style="font-size:0.85rem;color:#777;margin-top:3px;">${entry.category}</div>` : ''}
                            </div>
                            <div style="text-align:right;font-size:0.8rem;white-space:nowrap;color:#666;">
                                ${new Date(entry.updatedAt).toLocaleDateString(undefined, {month:'short', day:'numeric'})}
                            </div>
                        </a>
                    `).join('');
                }

                // Quick Actions bar
                const quickContainer = document.getElementById("quick-actions");
                quickContainer.innerHTML = `
                    <button onclick="window.location.href='Codex.html'" class="codex-tool-button">✏️ Open Codex</button>
                    <button onclick="handleExportAll()" class="codex-tool-button">📤 Export All</button>
                    <button onclick="window.location.href='Codex.html'" class="codex-tool-button">➕ New Entry</button>
                    <button onclick="window.location.href='Codex.html'" class="codex-tool-button">🔍 Browse All</button>
                `;

                console.log(`[Home Dashboard] Loaded successfully — ${total} entries, ${sortedRecent.length} recent`);
            } catch (e) {
                console.error("[Home Dashboard] Load failed:", e);
                const statsContainer = document.getElementById("stats-content");
                statsContainer.innerHTML = `<p style="grid-column:1/-1;color:#e74c3c;padding:20px;text-align:center;">Unable to load dashboard data</p>`;
            }
        }

        // Export helper (available because CodexStorage is loaded)
        window.handleExportAll = async () => {
            if (window.CodexStorage && typeof window.CodexStorage.exportEntries === "function") {
                try {
                    await window.CodexStorage.exportEntries();
                    // Toast will be shown by the export function itself
                } catch (err) {
                    console.warn("Export failed", err);
                }
            }
        };

        // Run dashboard after storage is ready
        window.addEventListener("load", () => {
            setTimeout(loadHomeDashboard, 350);
        });
    </script>
</body>
</html>
