<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex</title>
    <link rel="stylesheet" href="Styles.css">
    <script src="Shared.js" defer></script>
    <script src="CodexConfig.js" defer></script>
    <script src="CodexStorage.js" defer></script>
    <script src="CodexUI.js" defer></script>
</head>
<body>
    <header>
        <h1>Codex</h1>
        <nav>
            <ul>
                <li><a href="Index.html">Shared Resources</a></li>
                <li><a href="Home.html">Home</a></li>
            </ul>
        </nav>
        <button id="settings-button" aria-label="Open settings">⚙️</button>
    </header>

    <main>
        <div id="codex-tabs" class="tab-bar"></div>

        <section id="codex-filters" class="codex-filters">
            <input type="text" id="codex-search-input" placeholder="Search..." class="codex-filter-input">
            <input type="text" id="codex-tag-filter" placeholder="Filter by tag..." class="codex-filter-input">
            <label id="codex-favorite-filter-label" class="codex-filter-favorite hidden">
                <input type="checkbox" id="codex-favorite-filter">
                Favorites Only
            </label>
        </section>

        <section id="codex-new" class="codex-new-container"></section>

        <section id="codex-list" class="codex-list"></section>
    </main>
</body>
</html>
