<div id="settings-overlay" class="settings-overlay"></div>

<div id="settings-panel" class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="settings-header">
        <h2 id="settings-title">Settings</h2>
        <button id="settings-close" aria-label="Close settings" class="close-btn">✕</button>
    </div>

    <div class="settings-search">
        <input type="text" id="settings-search-input" placeholder="Search settings..." aria-label="Search settings">
    </div>

    <div class="settings-content">
        <div class="settings-section" data-section="theme">
            <div class="section-header" tabindex="0">
                <span>Theme</span>
                <span class="arrow">▼</span>
            </div>
            <div class="section-body hidden">
                <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:12px;">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; flex:1; min-width:120px;">
                        <input type="radio" name="theme" value="auto" checked>
                        <span style="display:inline-block; width:24px; height:24px; border-radius:6px; background:linear-gradient(90deg, #f4f4f4 50%, #1e1e1e 50%); border:2px solid #ccc; flex-shrink:0;"></span>
                        Auto (Match System)
                    </label>
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; flex:1; min-width:120px;">
                        <input type="radio" name="theme" value="light">
                        <span style="display:inline-block; width:24px; height:24px; border-radius:6px; background:#f4f4f4; border:2px solid #ccc; flex-shrink:0;"></span>
                        Light
                    </label>
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; flex:1; min-width:120px;">
                        <input type="radio" name="theme" value="dark">
                        <span style="display:inline-block; width:24px; height:24px; border-radius:6px; background:#1e1e1e; border:2px solid #ccc; flex-shrink:0;"></span>
                        Dark
                    </label>
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; flex:1; min-width:120px;">
                        <input type="radio" name="theme" value="blue">
                        <span style="display:inline-block; width:24px; height:24px; border-radius:6px; background:#e8ecf5; border:2px solid #ccc; flex-shrink:0;"></span>
                        Slate Blue
                    </label>
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; flex:1; min-width:120px;">
                        <input type="radio" name="theme" value="solarized">
                        <span style="display:inline-block; width:24px; height:24px; border-radius:6px; background:#fdf6e3; border:2px solid #ccc; flex-shrink:0;"></span>
                        Solarized
                    </label>
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; flex:1; min-width:120px;">
                        <input type="radio" name="theme" value="pastel">
                        <span style="display:inline-block; width:24px; height:24px; border-radius:6px; background:#faf4ff; border:2px solid #ccc; flex-shrink:0;"></span>
                        Pastel
                    </label>
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; flex:1; min-width:120px;">
                        <input type="radio" name="theme" value="forest">
                        <span style="display:inline-block; width:24px; height:24px; border-radius:6px; background:linear-gradient(90deg, #2e7d32 50%, #1b5e20 50%); border:2px solid #ccc; flex-shrink:0;"></span>
                        Forest
                    </label>
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; flex:1; min-width:120px;">
                        <input type="radio" name="theme" value="ocean">
                        <span style="display:inline-block; width:24px; height:24px; border-radius:6px; background:linear-gradient(90deg, #0277bd 50%, #01579b 50%); border:2px solid #ccc; flex-shrink:0;"></span>
                        Ocean
                    </label>
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; flex:1; min-width:120px;">
                        <input type="radio" name="theme" value="neon">
                        <span style="display:inline-block; width:24px; height:24px; border-radius:6px; background:linear-gradient(90deg, #0f0f23 50%, #1a0033 50%); border:2px solid #00ffff; flex-shrink:0;"></span>
                        Neon Glow
                    </label>
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; flex:1; min-width:120px;">
                        <input type="radio" name="theme" value="cyber">
                        <span style="display:inline-block; width:24px; height:24px; border-radius:6px; background:linear-gradient(90deg, #111111 50%, #220011 50%); border:2px solid #00ff9d; flex-shrink:0;"></span>
                        Cyberpunk
                    </label>
                </div>
                <label style="display:flex; align-items:center; gap:8px; margin-top:16px;">
                    Custom Accent Color
                    <input type="color" id="custom-accent-picker" value="#58a6ff" style="width:48px; height:32px; padding:2px; border:none; border-radius:6px; cursor:pointer;">
                </label>
                <button class="section-reset" id="reset-theme">Reset Theme</button>
            </div>
        </div>

        <div class="settings-section" data-section="font">
            <div class="section-header" tabindex="0">
                <span>Font Size</span>
                <span class="arrow">▼</span>
            </div>
            <div class="section-body hidden">
                <label><input type="radio" name="font-size" value="small"> Small</label>
                <label><input type="radio" name="font-size" value="medium" checked> Medium</label>
                <label><input type="radio" name="font-size" value="large"> Large</label>
                <button class="section-reset" id="reset-font">Reset Font Size</button>
            </div>
        </div>

        <div class="settings-section" data-section="accessibility">
            <div class="section-header" tabindex="0">
                <span>Accessibility</span>
                <span class="arrow">▼</span>
            </div>
            <div class="section-body hidden">
                <label><input type="checkbox" id="high-contrast-toggle"> High Contrast</label>
                <label><input type="checkbox" id="compact-mode-toggle"> Compact Mode</label>
                <button class="section-reset" id="reset-accessibility">Reset Accessibility</button>
            </div>
        </div>

        <div class="settings-section" data-section="advanced">
            <div class="section-header" tabindex="0">
                <span>Advanced</span>
                <span class="arrow">▼</span>
            </div>
            <div class="section-body hidden">
                <button id="export-settings" class="advanced-button">Export Settings</button>
                <button id="import-settings" class="advanced-button">Import Settings</button>
                <input type="file" id="import-file-input" accept=".json" hidden>
            </div>
        </div>

        <div class="settings-section" data-section="storage">
            <div class="section-header" tabindex="0">
                <span>Storage</span>
                <span class="arrow">▼</span>
            </div>
            <div class="section-body hidden">
                <div id="storage-info-container">
                    <p><strong>LocalStorage Usage</strong></p>
                    <div class="progress-container">
                        <div id="storage-progress-bar" class="progress-bar"></div>
                    </div>
                    <p id="storage-details" class="storage-details">Calculating...</p>
                </div>
                <button id="clear-storage-btn" class="advanced-button danger">Clear All LocalStorage Data</button>
                <p class="storage-warning">⚠️ This will delete ALL Codex data, drafts, and settings permanently. The page will reload after clearing.</p>
            </div>
        </div>
    </div>

    <button id="reset-settings" class="reset-button">Reset All</button>
</div>
